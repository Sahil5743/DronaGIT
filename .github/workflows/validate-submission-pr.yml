name: Validate Submission PR

on:
  pull_request:
    branches:
      - main
    paths:
      - "submissions/**"

jobs:
  validate:
    name: Validate Submission
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Validate all submissions in PR
        id: validate
        run: |
          if [ ! -d "submissions" ]; then
            echo "No submissions folder found. Nothing to validate."
            exit 0
          fi
          
          find submissions -name "metadata.json" -print0 2>/dev/null | xargs -0 --no-run-if-empty npx tsx scripts/validate-submissions.ts
